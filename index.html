<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waka Waka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Closest free match to "Waka Sans" display weight — swap for the real font when available -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="scroll-wrapper">
    <div class="container">

      <h2 class="waka">Waka</h2>

      <!--
        .grid__animation-wrapper clips the images via clip-path during the unfurl.
        It is positioned absolutely between the two WAKA headings.
      -->
      <div class="grid__animation-wrapper">
        <div class="grid">

          <!-- Featured (large, ~2/3 width) -->
          <a href="#" class="grid__item grid__item--featured" aria-label="Compartment Chair">
            <div class="grid__item-image">
              <!--
                background-color is the dominant palette colour extracted from the image.
                It acts as a placeholder before the image loads — same technique as the original.
                Shopify: replace src with {{ image | img_url: '1200x' }}
              -->
              <div class="responsive-image" style="background-color: #8c837b;">
                <img
                  src="https://cdn.sanity.io/images/8yrspuwy/production/255b56fe5b24b2aa2039b6c7305aa88cd30cc7e1-2444x3056.jpg?w=1200&fit=max&auto=format&q=85"
                  alt="Compartment Chair — featured view"
                  loading="eager"
                >
              </div>
            </div>
          </a>

          <!-- Side (smaller, ~1/3 width) -->
          <a href="#" class="grid__item grid__item--side" aria-label="Compartment Chair">
            <div class="grid__item-image">
              <div class="responsive-image" style="background-color: #84745c;">
                <img
                  src="https://cdn.sanity.io/images/8yrspuwy/production/85e2d3ee172dbc24aeaa4dc1de012065aa99b871-2437x3047.jpg?w=600&fit=max&auto=format&q=85"
                  alt="Compartment Chair — side view"
                  loading="eager"
                >
              </div>
            </div>
          </a>

        </div><!-- /.grid -->
      </div><!-- /.grid__animation-wrapper -->

      <h2 class="waka waka--bottom">Waka</h2>

    </div><!-- /.container -->
  </div><!-- /.scroll-wrapper -->

  <!-- Replay button — shown after animation completes so you can re-watch -->
  <button class="replay-btn" aria-label="Replay animation">&#8635; Replay</button>

  <!--
    GSAP via CDN.
    Shopify: move to theme.liquid and load via {{ 'gsap.min.js' | asset_url | script_tag }}
    or reference a CDN with integrity hash.
  -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
  <script src="js/animation.js"></script>

</body>
</html>
